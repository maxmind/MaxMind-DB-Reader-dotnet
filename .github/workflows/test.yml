name: Run tests
on:
  push:
  pull_request:
  schedule:
    - cron: '3 20 * * SUN'

permissions: {}

jobs:
  build:
    strategy:
      matrix:
        platform: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.platform }}
    name: Dotnet on ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          persist-credentials: false

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x

      - name: Build
        run: |
              dotnet build MaxMind.Db
              dotnet build MaxMind.Db.Benchmark
              dotnet build MaxMind.Db.Test
              dotnet build MaxMind.Db.AotTest

      - name: Run benchmark
        run: dotnet run -f net8.0 --project MaxMind.Db.Benchmark/MaxMind.Db.Benchmark.csproj
        env:
          MAXMIND_BENCHMARK_DB: ${{ github.workspace }}/MaxMind.Db.Test/TestData/MaxMind-DB/test-data/GeoIP2-City-Test.mmdb

      - name: Run tests
        run: dotnet test MaxMind.Db.Test/MaxMind.Db.Test.csproj
        env:
          MAXMIND_TEST_BASE_DIR: ${{ github.workspace }}/MaxMind.Db.Test

      - name: Test NativeAOT compatibility (JIT mode)
        run: dotnet run --project MaxMind.Db.AotTest/MaxMind.Db.AotTest.csproj

      - name: Test NativeAOT compatibility (AOT publish - Linux)
        if: runner.os == 'Linux'
        run: |
              dotnet publish MaxMind.Db.AotTest/MaxMind.Db.AotTest.csproj -c Release -r linux-x64 --self-contained
              ./MaxMind.Db.AotTest/bin/Release/net9.0/linux-x64/publish/MaxMind.Db.AotTest

      - name: Test NativeAOT compatibility (AOT publish - Windows)
        if: runner.os == 'Windows'
        run: |
              dotnet publish MaxMind.Db.AotTest/MaxMind.Db.AotTest.csproj -c Release -r win-x64 --self-contained
              ./MaxMind.Db.AotTest/bin/Release/net9.0/win-x64/publish/MaxMind.Db.AotTest.exe

      - name: Test NativeAOT compatibility (AOT publish - macOS)
        if: runner.os == 'macOS'
        run: |
              dotnet publish MaxMind.Db.AotTest/MaxMind.Db.AotTest.csproj -c Release -r osx-x64 --self-contained
              ./MaxMind.Db.AotTest/bin/Release/net9.0/osx-x64/publish/MaxMind.Db.AotTest
