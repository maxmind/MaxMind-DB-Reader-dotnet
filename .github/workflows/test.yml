name: Run tests
on:
  push:
  pull_request:
  schedule:
    - cron: "3 20 * * SUN"

permissions: {}

jobs:
  build:
    strategy:
      matrix:
        platform: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.platform }}
    name: Dotnet on ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: true
          persist-credentials: false

      - name: Setup .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Build
        run: dotnet build

      - name: Run benchmark
        run:
          dotnet run -f net8.0 --project
          MaxMind.Db.Benchmark/MaxMind.Db.Benchmark.csproj
        env:
          MAXMIND_BENCHMARK_DB:
            ${{ github.workspace
            }}/MaxMind.Db.Test/TestData/MaxMind-DB/test-data/GeoIP2-City-Test.mmdb

      - name: Run tests
        run: dotnet test
        env:
          MAXMIND_TEST_BASE_DIR: ${{ github.workspace }}/MaxMind.Db.Test

  native-aot:
    runs-on: ubuntu-latest
    name: Native AOT smoke test
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: true
          persist-credentials: false

      - name: Setup .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          dotnet-version: 10.0.x

      - name: Install Native AOT prerequisites
        run: sudo apt-get update && sudo apt-get install --yes clang zlib1g-dev

      - name: Publish Native AOT smoke test
        run: >-
          dotnet publish
          MaxMind.Db.NativeAot.Test/MaxMind.Db.NativeAot.Test.csproj
          --configuration Release
          --framework net10.0
          --runtime linux-x64
          --self-contained true
          --output ${{ runner.temp }}/native-aot

      - name: Run Native AOT smoke test
        run: ${{ runner.temp }}/native-aot/MaxMind.Db.NativeAot.Test
